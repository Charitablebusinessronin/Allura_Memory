# Enterprise Docker Compose Override
# Based on: https://github.com/blazity/next-enterprise
# Usage: docker compose -f docker-compose.yml -f docker-compose.enterprise.yml up -d

services:
  # ===========================================================================
  # Allura Memory - Enterprise Next.js Application
  # ===========================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.enterprise
    image: allura-memory:enterprise
    container_name: allura-memory-app
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      NODE_ENV: production
      # Database connections
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Feature flags
      PROMOTION_MODE: ${PROMOTION_MODE:-soc2}
      AUTO_APPROVAL_THRESHOLD: ${AUTO_APPROVAL_THRESHOLD:-0.85}
      # Observability
      OTEL_SERVICE_NAME: allura-memory
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # OpenTelemetry Collector - Observability Pipeline
  # ===========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: allura-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-config.yaml"]
    volumes:
      - ./docker/otelcol-config.yaml:/etc/otelcol-config.yaml:ro
    ports:
      - "4318:4318"   # OTLP HTTP receiver
      - "4319:4319"   # OTLP gRPC receiver
      - "8888:8888"   # Prometheus metrics
    networks:
      - knowledge-network

  # ===========================================================================
  # Prometheus - Metrics Backend
  # ===========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: allura-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - knowledge-network

  # ===========================================================================
  # Grafana - Observability Dashboard
  # ===========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: allura-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - otel-collector
    networks:
      - knowledge-network

  # ===========================================================================
  # Loki - Log Aggregation
  # ===========================================================================
  loki:
    image: grafana/loki:latest
    container_name: allura-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3101:3100"
    volumes:
      - loki_data:/loki
    networks:
      - knowledge-network

  # ===========================================================================
  # Redis - Session & Caching
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: allura-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowledge-network

  # ===========================================================================
  # Nginx - Reverse Proxy & Load Balancer
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: allura-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - knowledge-network

volumes:
  prometheus_data:
    name: allura_prometheus_data
  grafana_data:
    name: allura_grafana_data
  loki_data:
    name: allura_loki_data
  redis_data:
    name: allura_redis_data

networks:
  knowledge-network:
    driver: bridge
    name: allura-enterprise-network