---
# Model Registry for Memory Project Agents
# Centralized tracking of Ollama models used across all agents and skills

registry:
  # Primary reasoning models
  glm-5:
    name: glm-5:cloud
    provider: ollama
    type: reasoning
    description: General-purpose reasoning model for agent cognition
    agents:
      - bmad-master
    skills:
      - bmad-master
    status: active

  kimi-k2:
    name: kimi-k2.5:cloud
    provider: ollama
    type: reasoning
    description: High-quality reasoning for detailed analysis tasks
    agents: []
    skills:
      - code-reviewer
    status: active

  qwen3-large:
    name: qwen3.5:397b-cloud
    provider: ollama
    type: reasoning
    description: Large model for complex architectural decisions
    agents: []
    skills:
      - architect
    status: active

  # Embedding models
  qwen3-embedding:
    name: qwen3-embedding:8b
    provider: ollama
    type: embedding
    description: Embedding model for semantic search and deduplication
    agents: []
    skills:
      - code-context-retrieval
    status: active

  # Specialized models (from your environment)
  nemotron:
    name: nemotron-3-super:cloud
    provider: ollama
    type: reasoning
    description: NVIDIA Nemotron for synthetic data and evaluation
    agents: []
    skills: []
    status: available

  deepseek:
    name: deepseek-v3.2:cloud
    provider: ollama
    type: reasoning
    description: DeepSeek v3.2 for coding and reasoning tasks
    agents: []
    skills: []
    status: available

  minimax:
    name: minimax-m2.7:cloud
    provider: ollama
    type: reasoning
    description: MiniMax model for dialogue and reasoning
    agents: []
    skills: []
    status: available

  qwen3-small:
    name: qwen3:0.6b
    provider: ollama
    type: reasoning
    description: Small Qwen3 model for fast inference
    agents: []
    skills: []
    status: available

# Default assignments for new agents
defaults:
  reasoning: glm-5
  embedding: qwen3-embedding
  code-analysis: kimi-k2
  architecture: qwen3-large

# Usage notes:
# - Agents reference models via ${model.registry.glm-5.name}
# - Embedding model used for deduplication and semantic search
# - Codex is commented out until credits available (tomorrow)
# - All models pulled locally via Ollama
