# ═══════════════════════════════════════════════════════════════════
# Allura Agent-OS — menu.yaml
# Loop enforcement: every agent run has max_steps + on_complete: write_back
# Schema version: 2.1.0  (Brain Loop update — 2026-04-06)
# ═══════════════════════════════════════════════════════════════════

version: "2.1.0"
schema: "allura-menu"

# ── ORCHESTRATION ───────────────────────────────────────────────
commands:

  - name: memory:orchestrate
    description: "Run MemoryOrchestrator on a task — full PRE/RUN/POST brain loop"
    agent: MemoryOrchestrator
    loop: true
    max_steps: 15
    on_complete: write_back
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

  - name: memory:build
    description: "Run MemoryBuilder — infrastructure, schema, and write tasks"
    agent: MemoryBuilder
    loop: true
    max_steps: 15
    on_complete: write_back
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

  - name: memory:architect
    description: "Run MemoryArchitect — system design, API contracts, migration planning"
    agent: MemoryArchitect
    loop: true
    max_steps: 15
    on_complete: write_back
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

  - name: memory:guardian
    description: "Run MemoryGuardian — validation, quality gates, HITL approval"
    agent: MemoryGuardian
    loop: true
    max_steps: 10
    on_complete: write_back
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

  - name: memory:scout
    description: "Run MemoryScout — context discovery, research, Exa/YouTube/Context7"
    agent: MemoryScout
    loop: true
    max_steps: 10
    on_complete: write_back
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

  - name: memory:analyst
    description: "Run MemoryAnalyst — memory metrics, graph health, trace analysis"
    agent: MemoryAnalyst
    loop: true
    max_steps: 10
    on_complete: write_back
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

  - name: memory:chronicler
    description: "Run MemoryChronicler — documentation, spec updates, changelogs"
    agent: MemoryChronicler
    loop: true
    max_steps: 10
    on_complete: write_back
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

# ── BRAIN LOOP UTILITIES ────────────────────────────────────────

  - name: allura:brief
    description: "Daily prioritized plan — queries Neo4j + PostgreSQL for your actual state"
    agent: MemoryOrchestrator
    mode: read_only
    loop: false
    on_complete: no_write
    query:
      neo4j: >
        MATCH (p:Project)
        WHERE p.status <> 'complete'
          AND p.group_id IN $active_workspaces
        RETURN p ORDER BY p.priority ASC LIMIT 10
      postgres: >
        SELECT * FROM agent_traces
        WHERE status IN ('incomplete', 'blocked', 'pending_action')
        ORDER BY created_at DESC LIMIT 20
    output_format: daily_brief
    brief_sections:
      - blocked_tasks
      - in_progress_runs
      - queued_ready
      - lessons_this_week

  - name: allura:drift
    description: "Drift detection — compare opencode.json vs filesystem vs Notion registry"
    shell: "bun run .opencode/scripts/drift-detection.ts"
    loop: false
    on_complete: no_write

  - name: allura:health
    description: "System health check — verify Neo4j, PostgreSQL, all 8 MCP servers reachable"
    shell: "bun run .opencode/scripts/health-check.ts"
    loop: false
    on_complete: no_write

  - name: allura:primitives
    description: "Report agent primitive completion status (target: 12/12 green)"
    agent: MemoryAnalyst
    loop: false
    mode: read_only
    on_complete: no_write

# ── WORKSPACE-SPECIFIC SHORTCUTS ───────────────────────────────

  - name: work:faith-meats
    description: "Dispatch orchestrator scoped to allura-faith-meats workspace (P1)"
    agent: MemoryOrchestrator
    loop: true
    max_steps: 15
    on_complete: write_back
    context:
      workspace: "allura-faith-meats"
      priority: 1
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

  - name: work:nonprofit
    description: "Dispatch orchestrator scoped to nonprofit workspace"
    agent: MemoryOrchestrator
    loop: true
    max_steps: 15
    on_complete: write_back
    context:
      workspace: "allura-nonprofit"
    terminal_signals:
      - "DONE:"
      - "BLOCKED:"
      - "ACTION:"
    timeout_signal: "BLOCKED: loop-timeout"

# ── WRITE-BACK RULE (enforced by orchestrator, documented here) ──
#
# Every command with on_complete: write_back MUST produce:
#   1. A (:Task) node in Neo4j via memory() wrapper
#   2. A trace update in PostgreSQL agent_traces
#   3. A (:Decision) or (:Lesson) node if applicable
#
# Commands with on_complete: no_write are read-only utility runs.
# They may read from Neo4j and PostgreSQL but must not write.
#
# A run that writes nothing back is a dead end. The system only
# compounds if every session leaves a memory trace.
# ════════════════════════════════════════════════════════════════
