# =============================================================================
# QUICK SELECTION GUIDE
# =============================================================================
quick_guide:
  starting_a_task:
    primary: memory-orchestrator
    workflow: "Plan → Approve → Execute → Validate → Summarize"
    
  writing_code:
    primary: memory-architect
    subagent: memory-builder
    
  planning_complex_feature:
    subagent: memory-curator
    output: ".tmp/tasks/{feature}/task.json + subtask_NN.json"
    
  finding_standards:
    subagent: memory-scout
    note: "Approval gate exempt - call anytime"
    
  external_library_docs:
    subagent: memory-archivist
    note: "MANDATORY for any external package"
    
  writing_tests:
    subagent: memory-tester
    pattern: "Arrange-Act-Assert + Positive/Negative cases"
    
  code_review:
    subagent: memory-guardian
    focus: "Security, patterns, best practices"
    
  documentation:
    subagent: memory-chronicler
    type: "Technical writing, ADRs, guides"
    
  frontend_development:
    subagent: memory-interface
    stack: "React, Next.js, Tailwind"
    
  infrastructure:
    subagent: memory-infrastructure
    scope: "Docker, DB, deployment"

# =============================================================================
# WORKFLOW INTEGRATION
# =============================================================================
workflows:
  standard:
    - step: 1
      name: "Discover"
      agent: memory-scout
      action: "Find context files and standards"
      
    - step: 2
      name: "Approve"
      agent: memory-orchestrator
      action: "Present plan and request approval"
      
    - step: 3
      name: "Execute"
      agent: "[varies by task]"
      action: "Implement with context loaded"
      
    - step: 4
      name: "Validate"
      agent: memory-tester
      action: "Run tests and verify"
      
    - step: 5
      name: "Summarize"
      agent: memory-orchestrator
      action: "Report completion"

  complex_feature:
    - step: 1
      name: "Break Down"
      agent: memory-curator
      action: "Create task.json and subtasks"
      
    - step: 2
      name: "Execute Parallel"
      agent: memory-builder
      action: "Implement subtasks in batches"
      
    - step: 3
      name: "Validate"
      agent: memory-tester
      action: "Test all components"

