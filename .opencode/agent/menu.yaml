# =============================================================
# ALLURA MEMORY — OpenCode Agent Menu
# Version: 2.0.0 | Updated: 2026-04-06
# Brain Loop enforcement: loop: true, max_steps: 15 on all agents
# =============================================================

agents:
  # -----------------------------------------------------------
  # ORCHESTRATOR — Master supervisor, owns PRE/RUN/POST loop
  # -----------------------------------------------------------
  - name: MemoryOrchestrator
    description: |
      Master supervisor for the Allura Brain Loop.
      Runs PRE (read Neo4j context) → RUN (dispatch sub-agents, max 15 steps) → POST (write Task/Decision/Lesson nodes back to Neo4j).
      Every run ends with DONE: / BLOCKED: / ACTION: protocol.
      No run concludes without a confirmed memory write.
    file: .opencode/agent/MemoryOrchestrator.md
    loop: true
    max_steps: 15
    tools:
      - mcp-postgres
      - mcp-neo4j
    commands:
      - allura:brief
      - allura:run
      - allura:status

  # -----------------------------------------------------------
  # ANALYST — Research and information gathering
  # -----------------------------------------------------------
  - name: MemoryAnalyst
    description: |
      Research agent. Gathers information, watches videos, searches documentation.
      Reads memory context before researching. Writes findings as Lesson and Context nodes.
      Ends every run with DONE: / BLOCKED: / ACTION:.
    file: .opencode/agent/MemoryAnalyst.md
    loop: true
    max_steps: 15
    tools:
      - exa
      - youtube-transcript
      - context7
      - playwright
      - hyperbrowser

  # -----------------------------------------------------------
  # BUILDER — Data persistence and graph writes
  # -----------------------------------------------------------
  - name: MemoryBuilder
    description: |
      Persistence agent. Writes Task, Decision, Lesson, and Context nodes to Neo4j.
      Manages Postgres run log. Never reads from Neo4j without logging the read.
      Ends every run with DONE: confirming the node type and ID written.
    file: .opencode/agent/MemoryBuilder.md
    loop: true
    max_steps: 15
    tools:
      - mcp-postgres
      - mcp-neo4j

  # -----------------------------------------------------------
  # ARCHITECT — Schema design and architecture decisions
  # -----------------------------------------------------------
  - name: MemoryArchitect
    description: |
      Architecture agent. Makes schema decisions, designs system structure, reviews
      technical choices. Writes Decision nodes for every architectural choice made.
      Ends every run with DONE: and a Decision node confirmation.
    file: .opencode/agent/MemoryArchitect.md
    loop: true
    max_steps: 15
    tools:
      - nextjs-devtools
      - context7
      - mcp-postgres
      - playwright
      - hyperbrowser

# =============================================================
# CUSTOM COMMANDS
# =============================================================

commands:
  # -----------------------------------------------------------
  # allura:brief — Morning context brief from live memory state
  # -----------------------------------------------------------
  - name: allura:brief
    description: |
      Generates a prioritized daily plan from live Neo4j + Postgres state.
      Queries: open tasks, active projects, pending decisions, top lesson.
      Outputs structured brief with recommended first action.
      Writes a :Context node with the brief to Neo4j.
    agent: MemoryOrchestrator
    loop: true
    max_steps: 5
    prompt: |
      Run the allura:brief protocol:
      1. Query Neo4j for active projects, open tasks, pending decisions
      2. Query Postgres run_log for incomplete tasks from the last 7 days
      3. Generate a prioritized daily plan in this format:
         ## Allura Daily Brief — {today's date}
         ### 🔴 Blocked (needs attention now)
         ### 🟡 Active (in progress)
         ### 🟢 Open (ready to start)
         ### 💡 Top Lesson from Recent Runs
         ### 🎯 Recommended First Action
      4. Write a (:Context {domain: 'daily-brief', notes: <brief summary>, related_projects: [<active project names>]}) node to Neo4j
      5. End with: DONE: Daily brief generated. Context node written to Neo4j with domain 'daily-brief'.

  # -----------------------------------------------------------
  # allura:run — Start a new task through the full brain loop
  # -----------------------------------------------------------
  - name: allura:run
    description: |
      Runs a task through the full PRE/RUN/POST brain loop.
      Reads relevant memory, dispatches sub-agents, writes results back.
      Required arg: task description.
    agent: MemoryOrchestrator
    loop: true
    max_steps: 15
    prompt: |
      Execute the Allura Brain Loop for the provided task:
      PRE: Query Neo4j for relevant context (project nodes, recent lessons, open tasks)
      RUN: Dispatch appropriate sub-agent(s) with context bundle. Loop until DONE: or max 15 steps.
      POST: Write Task node, Decision node (if choice made), Lesson node (always) to Neo4j. Update Postgres run_log.
      End with: DONE: Task complete. [Node types] written to Neo4j. Postgres run_log updated.

  # -----------------------------------------------------------
  # allura:status — Quick status check of open items
  # -----------------------------------------------------------
  - name: allura:status
    description: |
      Quick read-only status check. Queries Neo4j and Postgres for open tasks and blocked items.
      Does not create new nodes — read only.
    agent: MemoryOrchestrator
    loop: false
    max_steps: 3
    prompt: |
      Run a status check only (no writes):
      1. Query Neo4j: MATCH (t:Task {status: 'open'}) RETURN t ORDER BY t.created_at DESC LIMIT 20
      2. Query Neo4j: MATCH (d:Decision {outcome: 'pending'}) RETURN d
      3. Query Postgres run_log for any runs with status 'blocked' or 'max_steps_reached' in last 48h
      4. Output a clean status table: Task | Status | Project | Created
      End with: DONE: Status check complete. No writes made.

# =============================================================
# LOOP ENFORCEMENT POLICY
# =============================================================
#
# loop: true  — agent will continue running steps until DONE: or max_steps
# max_steps: 15 — hard ceiling on all agent runs
#
# ALL agents follow the DONE: / BLOCKED: / ACTION: completion protocol.
# Any run that reaches max_steps without DONE: is logged to Postgres
# as status: 'max_steps_reached' and a Lesson node is still written.
#
# The POST write is non-negotiable.
# A completed run that writes nothing to Neo4j is architecturally equivalent to failure.
# =============================================================
