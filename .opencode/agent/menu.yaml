# OpenCode Agent Registry
# OpenCode-native memory agents in .opencode/

version: "1.0.0"
last_updated: "2026-04-03"

# =============================================================================
# PRIMARY AGENTS - Main orchestrators and planners
# =============================================================================
primary:
  - id: memory-orchestrator
    name: MemoryOrchestrator
    file: MemoryOrchestrator.md
    type: primary
    description: "Primary orchestration agent for roninmemory - coordinates memory-aware workflows across all domains"
    capabilities:
      - workflow coordination
      - task delegation
      - context management
      - subagent routing
    invoke_by: "@memory-orchestrator"
    best_for:
      - Starting new tasks
      - Coordinating multi-step workflows
      - Delegating to subagents
      - Managing context across agents

  - id: memory-architect
    name: MemoryArchitect
    file: MemoryArchitect.md
    type: primary
    description: "Architectural agent for roninmemory - designs memory-aware solutions and coordinates complex implementations"
    capabilities:
      - architectural design
      - code implementation
      - pattern application
      - technical planning
    invoke_by: "@memory-architect"
    best_for:
      - Complex coding tasks
      - Architecture decisions
      - Implementation planning
      - Technical design

# =============================================================================
# CORE SUBAGENTS - Essential supporting agents
# =============================================================================
core_subagents:
  - id: memory-scout
    name: MemoryScout
    file: subagents/core/contextscout.md
    type: subagent
    description: "Discovers internal context files BEFORE executing - saves time, avoids rework"
    capabilities:
      - context discovery
      - pattern finding
      - standard lookup
      - file location
    invoke_by: "@memory-scout"
    exemption: "Approval gate exempt - can be called without approval"
    best_for:
      - Finding coding standards
      - Discovering patterns
      - Locating relevant context
      - Pre-execution discovery

  - id: memory-archivist
    name: MemoryArchivist
    file: subagents/core/externalscout.md
    type: subagent
    description: "Fetches current documentation for external packages - MANDATORY for external libraries"
    capabilities:
      - external library docs
      - API documentation
      - Integration patterns
      - Current best practices
    invoke_by: "@memory-archivist"
    best_for:
      - New library integration
      - API usage patterns
      - External package setup
      - Current version docs

  - id: memory-curator
    name: MemoryCurator
    file: subagents/core/task-manager.md
    type: subagent
    description: "Curates and organizes tasks - transforms complex features into atomic, verifiable subtasks"
    capabilities:
      - task breakdown
      - dependency tracking
      - JSON task creation
      - parallel task identification
    invoke_by: "@memory-curator"
    loop: false
    best_for:
      - Complex feature breakdown
      - Task planning
      - Dependency mapping
      - Creating task JSONs

  - id: memory-chronicler
    name: MemoryChronicler
    file: subagents/core/documentation.md
    type: subagent
    description: "Generates comprehensive documentation - chronicler of the roninmemory system"
    capabilities:
      - documentation generation
      - technical writing
      - knowledge capture
      - ADR creation
    invoke_by: "@memory-chronicler"
    best_for:
      - Writing docs
      - Creating ADRs
      - Technical documentation
      - Knowledge base updates

  - id: memory-retriever
    name: MemoryRetriever
    file: subagents/core/context-retriever.md
    type: subagent
    description: "Generic context search and retrieval specialist - finds relevant context files and standards"
    capabilities:
      - context retrieval
      - standards lookup
      - pattern matching
      - file search
    invoke_by: "@memory-retriever"
    best_for:
      - Finding specific files
      - Standards lookup
      - Pattern discovery

