      - memory-architect
      - memory-curator
      - memory-chronicler
      
  bmb:
    description: "Workflow & Agent Building"
    agents:
      - memory-generator
      - memory-commander
      - memory-workflow
      - memory-organizer
      - memory-domain
      
  tea:
    description: "TEA - Test Architecture Enterprise"
    agents:
      - memory-tester
      - memory-guardian
      - memory-validator
      
  wds:
    description: "WDS - Workflow Design System"
    agents:
      - memory-interface
      - memory-visualizer

# =============================================================================
# USAGE NOTES
# =============================================================================
notes:
  - "All agents follow the approval gate rule (except memory-scout)"
  - "Primary agents can invoke subagents via task tool"
  - "Subagents are specialized - use the right tool for the job"
  - "Memory agents are the source of truth for direct agent files"
  - "Always load context before execution (critical requirement)"
  - "Use memory-scout for discovery before any implementation"
  - "Use memory-archivist for ANY external library work"
