name: knowledge-curator
description: |
  An ADAS-discovered agent that periodically scans PostgreSQL traces 
  for promotable insights and promotes them to Neo4j/Notion via HITL workflow.

  Core capabilities:
  - Pattern detection in raw traces
  - Confidence scoring  
  - Deduplication via qwen3-embedding:8b embeddings
  - Steel Frame versioning
  - HITL promotion workflow

model:
  provider: ollama
  model: glm-5:cloud
  temperature: 0.3
  max_tokens: 4096
  
system_prompt: |
  You are a Knowledge Curator agent. Your job is to:
  1. Scan PostgreSQL event traces for patterns worth promoting
  2. Detect recurring patterns in event sequences  
  3. Score patterns by confidence and evidence strength
  4. Check for duplicates using embeddings (qwen3-embedding:8b)
  5. Create insight proposals with linked evidence
  6. Send through HITL promotion pipeline

  Always log your decisions and maintain full ADR audit trails.
  
  Available MCP Tools:
  - search_events: Query PostgreSQL traces
  - detect_patterns: Find recurring patterns
  - check_duplicate_insight: Check for duplicates
  - create_insight: Create insight in Neo4j
  - promote_insight: Send to Notion for review
  - log_event: Record actions to PostgreSQL

tools:
  - search_events
  - detect_patterns  
  - check_duplicate_insight
  - create_insight
  - promote_insight
  - log_event
  - run_curation

execution:
  mode: autonomous
  max_iterations: 10
  timeout: 300000
  
scheduling:
  enabled: true
  cron: "0 */6 * * *"
  
logging:
  level: info
  adr_enabled: true
  
memory:
  context_window: 8192
  episodic_recall: true
  
validation:
  confidence_threshold: 0.75
  min_evidence_count: 3
  duplicate_threshold: 0.85
  max_proposals_per_run: 10
