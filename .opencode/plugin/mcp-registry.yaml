# Approved MCP Servers — Governance Layer
# Use MCP Docker Toolkit for discovery (mcp_find) and loading (mcp_add)
# This file tracks which servers Brooks has approved
# Version: 2026-04-09

governance: "brooks-approved"
group_id: "allura-system"

# APPROVED SERVERS (ready to load via mcp_add)
approved:
  - name: "allura-memory"
    description: "Local Neo4j + PostgreSQL memory engine"
    command: ["bun", "run", "src/mcp/memory-server.ts"]
    approved_by: "brooks"
    approved_date: "2026-04-09"

  - name: "tavily"
    description: "Web search, crawl, extract, research"
    env: ["TAVILY_API_TOKEN"]
    approved_by: "brooks"
    approved_date: "2026-04-09"

  - name: "exa"
    description: "Neural/semantic web search"
    env: ["EXA_API_KEY"]
    approved_by: "brooks"
    approved_date: "2026-04-09"

  - name: "hyperbrowser"
    description: "Browser automation, scraping"
    env: ["HYPERBROWSER_API_KEY"]
    approved_by: "brooks"
    approved_date: "2026-04-09"

  - name: "context7"
    description: "Live library documentation"
    approved_by: "brooks"
    approved_date: "2026-04-09"

  - name: "notion"
    description: "Notion databases and pages"
    env: ["NOTION_TOKEN"]
    approved_by: "brooks"
    approved_date: "2026-04-09"

# PENDING APPROVAL (Brooks must approve before mcp_add)
pending:
  - name: "postgresql"
    description: "Direct PostgreSQL client"
    env: ["DATABASE_URL"]
    notes: "Requires DATABASE_URL. Approve for direct DB access."

  - name: "neo4j"
    description: "Neo4j Cypher executor"
    env: ["NEO4J_URI", "NEO4J_USER", "NEO4J_PASSWORD"]
    notes: "HITL approval required. Cypher writes must audit SUPERSEDES versioning."

  - name: "github"
    description: "GitHub issues, PRs, commits"
    env: ["GITHUB_TOKEN"]
    notes: "Audit all writes. Never force-push."

# GOVERNANCE RULES
rules:
  - "Use mcp_find(keyword) to discover available servers"
  - "Use mcp_add(server_name) to load approved servers"
  - "Brooks approval required before adding pending servers"
  - "All MCP operations logged via mcp__MCP_DOCKER__insert_data"
constraints:
  max_concurrent_mcp_servers: 10
  max_env_vars_per_server: 5
  rate_limit_mcp_calls: "100 per minute"
  hitl_required_for: ["neo4j-cypher", "notion-mcp", "github-mcp"]
  audit_required_for: ["neo4j-cypher"]
