# ═══════════════════════════════════════════════════════════════════
# Allura Agent-OS — Agent Mapping Table
# Maps Surgical Team names to implementation files and dispatch contexts
# Version: 1.0.0 — 2026-04-06
# ═══════════════════════════════════════════════════════════════════

# ── SURGICAL TEAM (Primary) ────────────────────────────────────────

surgical_team:
  MemoryOrchestrator:
    role: "Chief Surgeon — coordinates, designs, preserves conceptual integrity"
    file: ".opencode/agent/core/openagent.md"
    menu_command: "memory:orchestrate"
    dispatch_via: "direct_prompt"
    max_steps: 15
    authority: "approves all work, dispatches subagents"
    permissions:
      bash: "allow"
      edit: "allow"
      write: "allow"
    logs_to: "PostgreSQL events, Neo4j Decisions"

  MemoryArchitect:
    role: "First Assistant — system design, ADRs, interface contracts"
    file: ".opencode/agent/core/MemoryArchitect.md"
    menu_command: "memory:architect"
    dispatch_via: "Task tool"
    max_steps: 15
    authority: "designs architecture, proposes contracts"
    permissions:
      bash: "deny"
      edit: "ask"
      write: "ask"
    logs_to: "PostgreSQL events, Neo4j Decisions"
    dispatch_after: "MemoryScout"

  MemoryBuilder:
    role: "Builder — infrastructure implementation, schema work"
    file: ".opencode/agent/core/MemoryBuilder.md"
    menu_command: "memory:build"
    dispatch_via: "Task tool"
    max_steps: 15
    authority: "implements approved designs"
    permissions:
      bash: "allow"
      edit: "allow"
      write: "allow"
    logs_to: "PostgreSQL events"
    dispatch_after: "MemoryArchitect approval"

  MemoryGuardian:
    role: "Inspector — validation, invariant checks, HITL gate"
    file: ".opencode/agent/subagents/code/reviewer.md"
    menu_command: "memory:guardian"
    dispatch_via: "Task tool"
    max_steps: 10
    authority: "validates work, blocks bad code"
    permissions:
      bash: "deny"
      edit: "deny"
      write: "deny"
    logs_to: "PostgreSQL events"
    dispatch_after: "implementation complete"

  MemoryScout:
    role: "Scout — context discovery, research (exempt from approval)"
    file: ".opencode/agent/subagents/core/contextscout.md"
    menu_command: "memory:scout"
    dispatch_via: "Task tool"
    max_steps: 10
    authority: "discovers context, research-first"
    permissions:
      bash: "deny"
      edit: "deny"
      write: "deny"
    logs_to: "PostgreSQL events"
    exemption: "APPROVAL_GATE_EXEMPT — can be called anytime"

  MemoryAnalyst:
    role: "Analyst — memory metrics, graph health, trace analysis"
    file: ".opencode/agent/core/MemoryAnalyst.md"
    menu_command: "memory:analyst"
    dispatch_via: "Task tool"
    max_steps: 10
    authority: "analyzes system health"
    permissions:
      bash: "deny"
      edit: "deny"
      write: "deny"
    logs_to: "PostgreSQL events"
    dispatch_after: "system operations, weekly"

  MemoryChronicler:
    role: "Chronicler — documentation, spec updates, changelogs"
    file: ".opencode/agent/subagents/core/documentation.md"
    menu_command: "memory:chronicler"
    dispatch_via: "Task tool"
    max_steps: 10
    authority: "documents completed work"
    permissions:
      bash: "deny"
      edit: "allow"
      write: "allow"
    logs_to: "PostgreSQL events"
    dispatch_after: "validation passes"

# ── ARCHIVED AGENTS (Not Active) ───────────────────────────────────

archived:
  MemoryCopywriter:
    file: ".opencode/agent/archive/MemoryCopywriter.md"
    reason: "Consolidated into MemoryChronicler"
    status: "inactive"

  MemoryRepoManager:
    file: ".opencode/agent/archive/MemoryRepoManager.md"
    reason: "Git operations handled by MemoryBuilder"
    status: "inactive"

  MemoryScribe:
    file: ".opencode/agent/archive/MemoryScribe.md"
    reason: "Consolidated into MemoryChronicler"
    status: "inactive"

