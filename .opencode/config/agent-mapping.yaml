# ── DISPATCH PROTOCOL ───────────────────────────────────────────────

dispatch_protocol:
  
  # When to Dispatch (Criteria)
  criteria:
    - "4+ files affected → delegate to MemoryBuilder"
    - "Architecture decision needed → delegate to MemoryArchitect"
    - "External research needed → delegate to MemoryScout"
    - "Validation required → delegate to MemoryGuardian"
    - "Documentation needed → delegate to MemoryChronicler"
    - "Specialized knowledge (UI, DevOps) → delegate to specialist subagent"

  # How to Dispatch
  mechanics:
    via_task_tool: |
      Task tool with subagent_type parameter:
      task({
        subagent_type: "MemoryGuardian",
        prompt: "Review this code for X..."
      })
    
    via_menu_command: |
      User can invoke directly:
      /memory:guardian
      /memory:scout
      etc.

  # Dispatch Sequence (Brooks's Law — minimize communication overhead)
  sequence:
    1_discovery: "MemoryScout — always first, exempt from approval"
    2_design: "MemoryArchitect — proposes architecture"
    3_approval: "MemoryOrchestrator — gate before build"
    4_build: "MemoryBuilder — implements approved design"
    5_validate: "MemoryGuardian — checks implementation"
    6_document: "MemoryChronicler — records what was done"

  # Anti-Patterns
  forbidden:
    - "Dispatch without explicit need (Brooks's Law)"
    - "Parallel dispatch when sequential needed (coordination cost)"
    - "Skip approval gate (except MemoryScout)"
    - "Dispatch to inactive/archived agents"

# ── LOGGING REQUIREMENTS ───────────────────────────────────────────

logging:
  every_dispatch:
    - "Log to PostgreSQL: event_type='AGENT_DISPATCHED'"
    - "Include: agent_name, task_description, timestamp"
  
  every_completion:
    - "Log to PostgreSQL: event_type='AGENT_COMPLETE'"
    - "Include: agent_name, outcome, files_modified"
    
  every_failure:
    - "Log to PostgreSQL: event_type='AGENT_BLOCKED'"
    - "Include: agent_name, error, resolution_needed"

