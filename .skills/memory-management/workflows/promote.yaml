name: insight-promotion
description: |
  Promote a draft insight to active status with optional human review.
  Includes duplicate detection, confidence validation, and audit logging.

triggers:
  - manual: User explicitly requests promotion
  - auto: Confidence >= 0.7 and no duplicates detected
  - scheduled: Curator agent identifies promotable insights

steps:
  - name: validate-insight
    description: Check if insight meets promotion criteria
    conditions:
      - confidence >= 0.7
      - status == "draft"
      - has summary (length > 20 chars)
      - has canonical_tag
    
  - name: check-duplicates
    description: Verify no similar insight already exists
    tool: check_duplicate_insight
    threshold: 0.8
    
  - name: human-review
    description: Present to human for approval (HITL gate)
    required: true
    condition: auto_promote == false
    
  - name: update-status
    description: Mark as active and mirror to Notion
    operations:
      - update_neo4j:
          status: "Approved"
          ai_accessible: true
          approved_at: "now"
      - create_notion_page:
          database: "Insights Database"
          status: "Approved"
          
  - name: audit-log
    description: Record promotion in ADR trail
    log:
      action: "insight_promoted"
      decision_context: "Human approved after duplicate check"
      counterfactuals:
        - "Auto-promote without review (rejected - HITL required)"
        - "Reject as duplicate (rejected - no duplicates found)"

output:
  status: "promoted"
  notion_page_id: "string"
  ai_accessible: true
  audit_trail: "linked"
