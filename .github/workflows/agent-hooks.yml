name: Allura Agent Hooks — Brooksian Surgical Team

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, edited]
  push:
    branches: [main, new-main]

jobs:
  route-to-agents:
    runs-on: ubuntu-latest
    # Opt into Node.js 24 to avoid September 2026 deprecation
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      # Dynamic routing via AGENT_MANIFEST (src/lib/agents/agent-manifest.ts)
      # To add a new CI-routed agent:
      #   1. Add scriptPath and ciRoutes to manifest entry
      #   2. This workflow automatically picks it up
      - name: Route to Surgical Team
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_ACTION: ${{ github.event.action }}
          GITHUB_PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          
          # Route events using manifest-driven dispatch
          # See: src/lib/agents/agent-manifest.ts for the routing table
          bun scripts/agents/dispatch.ts
      
      - name: Log to Allura Memory
        run: |
          bun scripts/log-github-event.ts \
            --event="${{ github.event_name }}" \
            --actor="${{ github.actor }}" \
            --repo="${{ github.repository }}" \
            --sha="${{ github.sha }}"