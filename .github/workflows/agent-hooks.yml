name: Allura Agent Hooks — Brooksian Surgical Team

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, edited]
  push:
    branches: [main, new-main]

jobs:
  route-to-agents:
    runs-on: ubuntu-latest
    # Opt into Node.js 24 to avoid September 2026 deprecation
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install
      
      - name: Route to Surgical Team
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USER: ${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Repository: ${{ github.repository }}"
          
          # Route events to appropriate agents (Brooksian Surgical Team)
          # Mapping: workflow events → existing agent scripts
          case "${{ github.event_name }}" in
            pull_request)
              echo "→ Routing to Dijkstra (Edsger Dijkstra) for code review"
              bun scripts/agents/dijkstra-review.ts "${{ github.event.pull_request.number }}"
              ;;
            push)
              echo "→ Routing to Knuth (Donald Knuth) for deep implementation analysis"
              bun scripts/agents/knuth-analyze.ts "${{ github.sha }}"
              ;;
            issues)
              echo "→ Routing to Brooks (Frederick Brooks) for issue triage"
              bun scripts/agents/brooks-triage.ts "${{ github.event.issue.number }}"
              ;;
          esac
      
      - name: Log to Allura Memory
        run: |
          bun scripts/log-github-event.ts \
            --event="${{ github.event_name }}" \
            --actor="${{ github.actor }}" \
            --repo="${{ github.repository }}" \
            --sha="${{ github.sha }}"
