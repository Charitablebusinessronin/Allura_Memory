name: Publish @allura/sdk

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.2.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: bun test
        working-directory: packages/sdk

      - name: Build SDK
        run: bun run build
        working-directory: packages/sdk

      - name: Verify build output
        run: |
          ls -la packages/sdk/dist/
          test -f packages/sdk/dist/index.js || { echo "Missing index.js (ESM)"; exit 1; }
          test -f packages/sdk/dist/index.cjs || { echo "Missing index.cjs (CJS)"; exit 1; }
          test -f packages/sdk/dist/index.d.ts || { echo "Missing index.d.ts (types)"; exit 1; }

      - name: Set version (release)
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd packages/sdk && bun run bump-version "$VERSION"

      - name: Set version (manual)
        if: github.event_name == 'workflow_dispatch'
        run: cd packages/sdk && bun run bump-version "${{ github.event.inputs.version }}"

      - name: Publish to npm
        working-directory: packages/sdk
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          bun publish --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}