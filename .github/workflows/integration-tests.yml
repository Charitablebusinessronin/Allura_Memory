name: Integration Tests

on:
  push:
    branches: [main, master, new-main]
  pull_request:
    branches: [main, master, new-main]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memory
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run integration tests
        run: bun test src/kernel/__tests__/mutate-events.test.ts
        env:
          RUN_DB_INTEGRATION: true
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: memory
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          RUVIX_KERNEL_SECRET: test-secret-key-for-ruvix-kernel-proof-engine-32chars
