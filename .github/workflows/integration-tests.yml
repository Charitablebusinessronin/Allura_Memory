name: Integration Tests

on:
  push:
    branches: [main, master, new-main]
  pull_request:
    branches: [main, master, new-main]
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: memory
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run database migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: memory
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          set -e
          # Wait for PostgreSQL to be ready (defensive — services healthcheck should cover this)
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres -d memory 2>/dev/null; then
              echo "PostgreSQL is ready"
              break
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 1
          done
          # Apply init scripts in order (all use IF NOT EXISTS / idempotent patterns)
          for sql_file in $(ls -1v docker/postgres-init/*.sql); do
            echo "Applying $sql_file..."
            psql -v ON_ERROR_STOP=1 -f "$sql_file"
          done

      - name: Run integration tests
        run: bun test src/kernel/__tests__/mutate-events.test.ts
        env:
          RUN_DB_INTEGRATION: true
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: memory
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          RUVIX_KERNEL_SECRET: test-secret-key-for-ruvix-kernel-proof-engine-32chars
