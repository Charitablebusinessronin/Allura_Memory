name: AI-Guidelines Compliance

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.md'
      - '**.ts'
      - '**.json'

jobs:
  check-disclosure:
    runs-on: ubuntu-latest
    name: Validate AI-Assisted Documentation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI-Assisted disclosure blocks
        run: |
          echo "🔍 Validating AI-Assisted documentation..."
          
          # Find files changed in this PR that might be AI-generated
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(md|ts|json)$' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "✅ No documentation files changed"
            exit 0
          fi
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""
          
          # Check each changed file for disclosure block
          VIOLATIONS=0
          
          for file in $CHANGED_FILES; do
            # Skip certain files
            if [[ "$file" == *"node_modules"* ]] || [[ "$file" == *".git"* ]]; then
              continue
            fi
            
            # Check if file has AI-Assisted disclosure
            if ! grep -q "AI-Assisted Documentation" "$file" 2>/dev/null; then
              # Check if file was likely AI-generated (contains AI-related terms)
              if grep -qi "claude\|copilot\|gpt\|generated by ai\|ai-assisted" "$file" 2>/dev/null; then
                echo "❌ Missing disclosure block: $file"
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            else
              echo "✅ Has disclosure: $file"
            fi
          done
          
          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "🔴 $VIOLATIONS file(s) missing AI-Assisted disclosure blocks"
            echo ""
            echo "Required disclosure block:"
            echo '  > [!NOTE]'
            echo '  > **AI-Assisted Documentation**'
            echo '  > Portions of this document were drafted with the assistance of an AI language model.'
            echo '  > Content has been reviewed against architectural principles and should be kept in sync with source-of-truth docs.'
            echo '  > When in doubt, defer to code, schemas, and team consensus.'
            echo ""
            exit 1
          fi
          
          echo "✅ All AI-assisted documentation has proper disclosure blocks"

      - name: Validate Brooksian principles
        run: |
          echo "🔍 Validating Brooksian principles..."
          
          # Check for architectural overreach
          if grep -r "AI should decide" . --include="*.md" --include="*.ts" 2>/dev/null; then
            echo "❌ Found AI overreach: 'AI should decide'"
            exit 1
          fi
          
          # Check for proper deferral to source of truth
          if ! grep -q "defer to code" AI-GUIDELINES.md 2>/dev/null; then
            echo "⚠️  AI-GUIDELINES.md missing 'defer to code' language"
          fi
          
          echo "✅ Brooksian principles validated"

      - name: Check agent harness sync
        run: |
          echo "🔍 Checking agent harness synchronization..."
          
          # Verify all three harnesses reference AI-GUIDELINES
          HARNESS_COUNT=0
          
          if grep -q "AI-GUIDELINES.md" .opencode/config.json 2>/dev/null; then
            echo "✅ OpenCode references AI-GUIDELINES"
            HARNESS_COUNT=$((HARNESS_COUNT + 1))
          fi
          
          if grep -q "AI-GUIDELINES.md" .github/copilot-instructions.md 2>/dev/null; then
            echo "✅ GitHub Copilot references AI-GUIDELINES"
            HARNESS_COUNT=$((HARNESS_COUNT + 1))
          fi
          
          if grep -q "AI-GUIDELINES" CLAUDE.md 2>/dev/null || grep -q "AI-GUIDELINES" .claude/CLAUDE.md 2>/dev/null; then
            echo "✅ Claude Code references AI-GUIDELINES"
            HARNESS_COUNT=$((HARNESS_COUNT + 1))
          fi
          
          if [ $HARNESS_COUNT -lt 2 ]; then
            echo "⚠️  Only $HARNESS_COUNT/3 harnesses reference AI-GUIDELINES"
          else
            echo "✅ $HARNESS_COUNT/3 harnesses synchronized"
          fi

      - name: Check for stale documentation
        run: |
          echo "🔍 Checking for stale documentation (> 90 days since last update)..."
          echo "Policy: AI-GUIDELINES.md §8 — flag docs > 90 days old for retrospective review."
          echo ""
          
          STALE_COUNT=0
          CUTOFF_DATE=$(date -d "90 days ago" +%s)
          TODAY=$(date +%s)
          
          # Check all canonical docs in docs/allura/
          for doc in docs/allura/*.md; do
            [ -f "$doc" ] || continue
            
            # Extract the last-update date from document footers or git
            LAST_UPDATED=$(grep -oP "(?:Last updated|Updated|F17–F40.*added)\s*(?:\:\s*)?\K\d{4}-\d{2}-\d{2}" "$doc" 2>/dev/null | tail -1)
            
            if [ -z "$LAST_UPDATED" ]; then
              # Fallback: use git log for last modification date of the file
              LAST_UPDATED=$(git log -1 --format="%ad" --date=short -- "$doc" 2>/dev/null || echo "unknown")
            fi
            
            if [ "$LAST_UPDATED" != "unknown" ]; then
              DOC_EPOCH=$(date -d "$LAST_UPDATED" +%s 2>/dev/null || echo 0)
              DAYS_OLD=$(( (TODAY - DOC_EPOCH) / 86400 ))
              
              if [ $DOC_EPOCH -lt $CUTOFF_DATE ]; then
                echo "⚠️  STALE ($DAYS_OLD days): $doc (last: $LAST_UPDATED)"
                STALE_COUNT=$((STALE_COUNT + 1))
              else
                echo "✅ Fresh ($DAYS_OLD days): $doc (last: $LAST_UPDATED)"
              fi
            else
              echo "❓ Unknown age: $doc"
            fi
          done
          
          echo ""
          if [ $STALE_COUNT -gt 0 ]; then
            echo "📋 $STALE_COUNT stale document(s) found — flagged for next team retrospective."
            echo "   Non-blocking: this does not fail the build. Review at your convenience."
          else
            echo "✅ All canonical documents within 90-day freshness window"
          fi
