name: Skill Triage

on:
  push:
    paths:
      - '.opencode/skills/**'
      - '.opencode/scripts/check-skills.py'
      - '.opencode/SKILL-OWNERSHIP.md'
      - '.opencode/manifest.json'
      - '.opencode/config/agent-skills.json'
  pull_request:
    paths:
      - '.opencode/skills/**'
      - '.opencode/scripts/check-skills.py'
      - '.opencode/SKILL-OWNERSHIP.md'
      - '.opencode/manifest.json'
      - '.opencode/config/agent-skills.json'
  workflow_dispatch:
    inputs:
      fail_on_dead:
        description: 'Fail CI if dead skills found (blocking mode)'
        required: false
        default: false
        type: boolean

jobs:
  skill-triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run skill checker
        run: |
          if [ "${{ github.event.inputs.fail_on_dead }}" == "true" ]; then
            python3 .opencode/scripts/check-skills.py --fail-on-dead
          else
            python3 .opencode/scripts/check-skills.py
          fi
        continue-on-error: true
      - name: Upload triage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-triage-report
          path: .opencode/skill-triage-report.json
          retention-days: 30
