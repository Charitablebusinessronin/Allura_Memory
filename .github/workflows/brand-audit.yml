name: Brand Audit

on:
  push:
    branches: [main, master, new-main, develop]
  pull_request:
    branches: [main, master, new-main, develop]

jobs:
  brand-audit:
    name: Brand Compliance Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Run Brand Audit
        run: |
          chmod +x scripts/brand-audit.sh
          bash scripts/brand-audit.sh

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brand-audit-report
          path: |
            brand-audit-results.json
          if-no-files-found: ignore
          retention-days: 30