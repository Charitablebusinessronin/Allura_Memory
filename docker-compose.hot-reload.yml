# Development override for the Allura dashboard.
# Use with:
#   docker compose --env-file .env --env-file .env.local -f docker-compose.yml -f docker-compose.hot-reload.yml up -d web
services:
  web:
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - allura_web_node_modules:/app/node_modules
    command: ["bun", "run", "dev"]

volumes:
  allura_web_node_modules:
