# Sovereign Memory MVP - Docker Compose
# One-command deployment: docker compose up -d

version: "3.9"

services:
  # PostgreSQL - Raw Trace Storage
  postgres:
    image: postgres:16-alpine
    container_name: sovereign-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sovereign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sovereign-secret}
      POSTGRES_DB: ${POSTGRES_DB:-memory}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sovereign} -d ${POSTGRES_DB:-memory}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovereign-network

  # Neo4j - Knowledge Graph
  neo4j:
    image: neo4j:5.26-community
    container_name: sovereign-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-sovereign-secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
      NEO4J_dbms_memory_pagecache_size: "512m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sovereign-network

  # MCP Server - Model Context Protocol
  mcp-server:
    build:
      context: ..
      dockerfile: sovereign-memory-mvp/Dockerfile
    container_name: sovereign-mcp
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sovereign}:${POSTGRES_PASSWORD:-sovereign-secret}@postgres:5432/${POSTGRES_DB:-memory}
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sovereign-secret}
      MCP_PORT: ${MCP_PORT:-3000}
    ports:
      - "${MCP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - sovereign-network
    command: ["bun", "run", "src/mcp/memory-server.ts"]

  # Paperclip Dashboard - HITL Governance UI
  paperclip:
    build:
      context: ..
      dockerfile: sovereign-memory-mvp/Dockerfile.paperclip
    container_name: sovereign-paperclip
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sovereign}:${POSTGRES_PASSWORD:-sovereign-secret}@postgres:5432/${POSTGRES_DB:-memory}
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-sovereign-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - sovereign-network
    command: ["bun", "run", "src/app/(main)/dashboard/paperclip/page.tsx"]

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:

networks:
  sovereign-network:
    driver: bridge