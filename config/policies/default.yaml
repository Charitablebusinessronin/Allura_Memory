# Default Policy Specification
# Story 3.1: Mediate Tool Calls via Policy Gateway
#
# This policy defines the default security stance:
# - Deny by default
# - Admin role has full access
# - Operators can execute most tools
# - Agents have limited tool access
# - Viewers can only read

version: "1.0.0"
name: "default-policy"
description: "Default security policy for governed runtime"

# Default decision when no rules match
defaultDecision: "deny"

# Role definitions with permissions
roles:
  - role: "admin"
    permissions:
      - action: "execute"
        resource: "*"
      - action: "read"
        resource: "*"
      - action: "write"
        resource: "*"
      - action: "admin"
        resource: "*"

  - role: "operator"
    permissions:
      - action: "execute"
        resource: "tool:*"
      - action: "read"
        resource: "*"
      - action: "write"
        resource: "tool:*"

  - role: "agent"
    permissions:
      - action: "execute"
        resource: "tool:postgres.query"
      - action: "execute"
        resource: "tool:neo4j.query"
      - action: "execute"
        resource: "tool:search.query"
      - action: "read"
        resource: "database:postgres"
      - action: "read"
        resource: "database:neo4j"

  - role: "viewer"
    permissions:
      - action: "read"
        resource: "database:postgres"
      - action: "read"
        resource: "database:neo4j"

  - role: "guest"
    permissions: []

# Policy rules (evaluated in priority order)
rules:
  # High priority: Always deny dangerous operations for non-admins
  - id: "deny-dangerous-tools"
    name: "Deny Dangerous Tools"
    description: "Block access to dangerous system tools for non-admins"
    effect: "deny"
    priority: 100
    actions:
      - "execute"
    resources:
      - "tool:system.shutdown"
      - "tool:system.restart"
      - "tool:system.config"
      - "tool:network.open_port"
    conditions:
      - field: "role"
        operator: "not_equals"
        value: "admin"

  # Allow read operations for authenticated users
  - id: "allow-read-operations"
    name: "Allow Read Operations"
    description: "Allow read operations for authenticated users"
    effect: "allow"
    priority: 50
    actions:
      - "read"
    resources:
      - "*"
    conditions:
      - field: "role"
        operator: "not_equals"
        value: "guest"
      - field: "role"
        operator: "exists"

  # Block side effects from guests
  - id: "block-guest-side-effects"
    name: "Block Guest Side Effects"
    description: "Prevent guests from making any changes"
    effect: "deny"
    priority: 90
    actions:
      - "execute"
      - "write"
      - "admin"
    resources:
      - "*"
    conditions:
      - field: "role"
        operator: "equals"
        value: "guest"

  # Require review for high-risk operations
  - id: "review-high-risk"
    name: "Review High Risk Operations"
    description: "High-risk tools require operator or admin approval"
    effect: "deny"
    priority: 80
    actions:
      - "execute"
    resources:
      - "tool:postgres.mutate"
      - "tool:neo4j.mutate"
      - "tool:file.write"
      - "tool:api.external"
    conditions:
      - field: "role"
        operator: "equals"
        value: "agent"

  # Rate limiting check (context-based)
  - id: "check-rate-limits"
    name: "Check Rate Limits"
    description: "Enforce rate limits on tool calls"
    effect: "allow"
    priority: 40
    actions:
      - "execute"
    resources:
      - "*"
    conditions:
      - field: "metadata.rateLimitExceeded"
        operator: "not_equals"
        value: true

  # Allow agent execution for approved tools
  - id: "allow-agent-tools"
    name: "Allow Agent Tools"
    description: "Agents can execute approved tools"
    effect: "allow"
    priority: 30
    actions:
      - "execute"
    resources:
      - "tool:postgres.query"
      - "tool:neo4j.query"
      - "tool:search.query"
    conditions:
      - field: "role"
        operator: "equals"
        value: "agent"

metadata:
  createdAt: "2025-01-15T00:00:00Z"
  updatedAt: "2025-01-15T00:00:00Z"
  author: "system"
  environment: "production"