# roninmemory Custom BMad Module Configuration
# Bridges .opencode/agent/ agents to BMad discovery

module:
  name: roninmemory
  displayName: "RoninMemory Agent System"
  description: "Brooksian memory-aware agent surgical team for unified AI engineering"
  version: "1.0.0"
  author: "roninmemory"
  
# Module paths (relative to _bmad/)
paths:
  agents: "../.opencode/agent/"
  skills: "../.opencode/skills/"
  docs: "../docs/"
  
# Discovery configuration
discovery:
  # Agents are discovered from custom agent-manifest.csv
  agentManifest: "_bmad/_config/custom/agent-manifest.csv"
  # Skills are discovered from custom skill-manifest.csv
  skillManifest: "_bmad/_config/custom/skill-manifest.csv"
  # Help entries are discovered from custom bmad-help.csv
  helpManifest: "_bmad/_config/custom/bmad-help.csv"
  
# Agent mapping
# Maps canonical BMad agent names to .opencode/agent/ paths
agentMapping:
  memory-orchestrator:
    path: ".opencode/agent/core/openagent.md"
    type: primary
    role: orchestrator
  memory-architect:
    path: ".opencode/agent/core/opencoder.md"
    type: primary
    role: architect
  memory-scout:
    path: ".opencode/agent/subagents/core/contextscout.md"
    type: subagent
    role: context-discovery
  memory-archivist:
    path: ".opencode/agent/subagents/core/externalscout.md"
    type: subagent
    role: external-docs
  memory-curator:
    path: ".opencode/agent/subagents/core/task-manager.md"
    type: subagent
    role: task-breakdown
  memory-chronicler:
    path: ".opencode/agent/subagents/core/documentation.md"
    type: subagent
    role: documentation
  memory-builder:
    path: ".opencode/agent/subagents/code/coder-agent.md"
    type: subagent
    role: implementation
  memory-tester:
    path: ".opencode/agent/subagents/code/test-engineer.md"
    type: subagent
    role: testing
  memory-guardian:
    path: ".opencode/agent/subagents/code/reviewer.md"
    type: subagent
    role: review
  memory-validator:
    path: ".opencode/agent/subagents/code/build-agent.md"
    type: subagent
    role: validation
  memory-organizer:
    path: ".opencode/agent/subagents/system-builder/context-organizer.md"
    type: subagent
    role: context-organization
  memory-interface:
    path: ".opencode/agent/subagents/development/frontend-specialist.md"
    type: subagent
    role: frontend
  memory-infrastructure:
    path: ".opencode/agent/subagents/development/devops-specialist.md"
    type: subagent
    role: devops

# Skill mapping
# Maps custom skills to their implementations
skillMapping:
  memory-bootstrap:
    path: ".opencode/skills/memory-bootstrap/SKILL.md"
    category: core
  memory-query:
    path: ".opencode/skills/memory-query/SKILL.md"
    category: core
  memory-log:
    path: ".opencode/skills/memory-log/SKILL.md"
    category: core
  memory-orchestrate:
    path: ".opencode/skills/memory-orchestrate/SKILL.md"
    category: orchestration
  memory-plan:
    path: ".opencode/skills/memory-plan/SKILL.md"
    category: planning
  memory-build:
    path: ".opencode/skills/memory-build/SKILL.md"
    category: implementation
  memory-test:
    path: ".opencode/skills/memory-test/SKILL.md"
    category: testing
  memory-review:
    path: ".opencode/skills/memory-review/SKILL.md"
    category: review
  memory-validate:
    path: ".opencode/skills/memory-validate/SKILL.md"
    category: validation
  superpowers-memory:
    path: ".opencode/skills/superpowers-memory/SKILL.md"
    category: integration

# Integration settings
integration:
  # Primary agent namespace
  agentNamespace: "memory-"
  # Agent file extension
  agentExtension: ".md"
  # Hybrid mode: keep agents in .opencode/agent/, reference from BMad
  hybridMode: true
  # Auto-register agents on startup
  autoRegister: false
  
# Memory system integration
memory:
  # PostgreSQL for raw traces
  postgres:
    enabled: true
    connectionEnv: "DATABASE_URL"
  # Neo4j for curated knowledge
  neo4j:
    enabled: true
    connectionEnv: "NEO4J_URI"
  # Steel Frame versioning
  steelFrame:
    enabled: true
    pattern: "SUPERSEDES"
  # HITL gates
  hitl:
    enabled: true
    requiredForPromotion: true
