# =============================================================================
# PRIMARY docker-compose.yml — use this for all local development and production
# =============================================================================
# Other compose files in this repo:
#   docker/docker-compose.yml              — DEPRECATED (legacy sandbox, do not use)
#   docker-compose.enterprise.yml         — enterprise/multi-tenant overlay only
#   archive/sovereign-memory-mvp/*        — archived MVP, historical reference only
#
# To start the full stack:
#   docker compose up
# =============================================================================

services:
  postgres:
    image: postgres:16
    container_name: knowledge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26-community
    container_name: knowledge-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 20

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allura-web
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      RUVECTOR_HOST: ruvector
      RUVECTOR_PORT: 5432
      RUVECTOR_USER: ${POSTGRES_USER:-ruvector}
      RUVECTOR_PASSWORD: ${POSTGRES_PASSWORD:-ruvector}
      RUVECTOR_DB: ${POSTGRES_DB:-ruvector_test}
      RUVIX_KERNEL_SECRET: ${RUVIX_KERNEL_SECRET}
      DEFAULT_GROUP_ID: ${DEFAULT_GROUP_ID:-allura-default}
      ALLURA_DEV_AUTH_ENABLED: ${ALLURA_DEV_AUTH_ENABLED:-true}
      ALLURA_DEV_AUTH_ROLE: ${ALLURA_DEV_AUTH_ROLE:-admin}
      ALLURA_DEV_AUTH_GROUP_ID: ${ALLURA_DEV_AUTH_GROUP_ID:-allura-roninmemory}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/api/health/live >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  dozzle:
    image: amir20/dozzle:latest
    container_name: knowledge-dozzle
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: allura-memory-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_CLOUD_URL: ${OLLAMA_CLOUD_URL:-https://ollama.com}
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # RuVector - High Performance Vector DB with GNN
  # https://github.com/Charitablebusinessronin/RuVector
  ruvector:
    image: ruvnet/ruvector-postgres:latest
    container_name: knowledge-ruvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ruvector}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruvector}
      POSTGRES_DB: ${POSTGRES_DB:-ruvector_test}
    ports:
      - "5433:5432"
    volumes:
      - ruvector_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruvector} -d ${POSTGRES_DB:-ruvector_test}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: memory_postgres_data
  neo4j_data:
  neo4j_logs:
  ruvector_data:
    name: memory_ruvector_data

networks:
  knowledge-network:
    driver: bridge
