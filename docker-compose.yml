# =============================================================================
# PRIMARY docker-compose.yml — Allura Brain (v2.2.0) — env-standard edition
# =============================================================================
# Changes in v2.2.0:
#   - Added explicit .env file loading for MCP containers (fixes credential drift)
#   - Standardized env_file pattern across all services
#   - MCP server now properly loads .env then .env.local for file precedence
#   - Pinned all environment configuration for reproducibility
# =============================================================================
# Other compose files in this repo:
#   docker/docker-compose.yml              — DEPRECATED (legacy sandbox, do not use)
#   docker-compose.enterprise.yml         — enterprise/multi-tenant overlay only
#   archive/sovereign-memory-mvp/*        — archived MVP, historical reference only
#
# To start the full stack:
#   docker compose up -d
# To check service health:
#   docker compose ps
# To rebuild all containers with current env:
#   docker compose build --no-cache
# To restart containers and reload env:
#   docker compose restart mcp http-gateway && docker compose logs -f mcp

# =============================================================================
# Environment Variable Standardization (v2.2.0)
# =============================================================================
# This compose file uses a consistent pattern for environment configuration:
#
# 1. env_file: .env        — Base configuration (commit to git safely)
# 2. env_file: .env.local  — Local secrets/overrides (NOT in git)
#    - .env.local is intentionally .gitignored (see .gitignore)
#    - It takes precedence: values in .env.local override .env
#
# MCP Container Loading Order:
#   1. .env (base config from repo)
#   2. .env.local (local overrides with secrets)
#   3. Explicit environment variables override both
#
# Why this matters:
#   - .env.local can hold local PG password and Neo4j credential overrides
#   - Docker builds with --no-cache ensure env_file paths are current
#   - Container restarts trigger env_file re-evaluation
#
# To verify env loading in MCP container:
#   docker compose exec mcp env | grep -E '(POSTGRES|NEO4J|OLLAMA)'
#
# To rebuild with current env (critical after .env changes):
#   docker compose down
#   docker compose build --no-cache
#   docker compose up -d
# =============================================================================
# =============================================================================

services:
  # PostgreSQL 16 — Primary database (events, traces, pgvector embeddings)
  # Temporary image tag: pgvector:pg16. Verify extversion at runtime before HNSW migration.
  # This matches the existing volume's data version and prevents auto-upgrade to PG17
  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledge-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Neo4j 5.26.0 — Knowledge graph database
  # Version pin: 5.26.0-community (specific patch version, not :community)
  # Prevents unexpected minor version upgrades that could break compatibility
  neo4j:
    image: neo4j:5.26.0-community
    container_name: knowledge-neo4j
    restart: unless-stopped
    # Do NOT load the full .env file here — any NEO4J_* variable is interpreted
    # as a Neo4j config key by the official image entrypoint, causing fatal
    # "Unrecognized setting" errors on startup (e.g. NEO4J_READ_TIMEOUT → READ.TIMEOUT).
    # Only pass the explicitly whitelisted variables Neo4j actually needs.
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - knowledge-network
    # Healthcheck uses wget — curl is NOT available in neo4j:5.26.0-community
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  # Neo4j schema initializer — applies indexes/constraints on first startup
  neo4j-init:
    image: neo4j:5.26.0-community
    container_name: allura-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./docker/neo4j-init:/cypher:ro
    networks:
      - knowledge-network
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Applying Neo4j schema..."
        for f in /cypher/*.cypher; do
          echo "  Running: $$f"
          cypher-shell -a bolt://neo4j:7687 -u "$${NEO4J_USER}" -p "$${NEO4J_PASSWORD}" --format plain < "$$f" || echo "  WARN: $$f had errors (may already exist)"
        done
        echo "Schema applied."
    restart: "no"

  # Web frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allura-web
    restart: unless-stopped
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    env_file:
      - .env
      - .env.local
    environment:
      - PORT=3100
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - RUVECTOR_HOST=postgres
      - RUVECTOR_PORT=5432
      - RUVECTOR_USER=${POSTGRES_USER}
      - RUVECTOR_PASSWORD=${POSTGRES_PASSWORD}
      - RUVECTOR_DB=${POSTGRES_DB}
      - GRAPH_BACKEND=${GRAPH_BACKEND:-neo4j}
      - RUVIX_KERNEL_SECRET=${RUVIX_KERNEL_SECRET}
      - DEFAULT_GROUP_ID=${DEFAULT_GROUP_ID:-allura-roninmemory}
      - ALLURA_DEV_AUTH_ENABLED=${ALLURA_DEV_AUTH_ENABLED:-true}
      - ALLURA_DEV_AUTH_ROLE=${ALLURA_DEV_AUTH_ROLE:-admin}
      - ALLURA_DEV_AUTH_GROUP_ID=${ALLURA_DEV_AUTH_GROUP_ID:-allura-roninmemory}
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://0.0.0.0:3100/api/health/live >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 45s

  # Dozzle - Docker log aggregation
  dozzle:
    image: amir20/dozzle:latest
    container_name: knowledge-dozzle
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5

  # MCP server (Memory Control Plane)
  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: allura-memory-mcp
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - RUVECTOR_HOST=postgres
      - RUVECTOR_PORT=5432
      - RUVECTOR_USER=${POSTGRES_USER}
      - RUVECTOR_DB=${POSTGRES_DB}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_CLOUD_URL=${OLLAMA_CLOUD_URL:-https://ollama.com}
      - GRAPH_BACKEND=${GRAPH_BACKEND:-neo4j}
      - DEFAULT_GROUP_ID=${DEFAULT_GROUP_ID:-allura-roninmemory}
      - RUVIX_KERNEL_SECRET=${RUVIX_KERNEL_SECRET}
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD", "bun", "run", "scripts/mcp-container-healthcheck.ts"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # HTTP Gateway for MCP - provides HTTP access to memory tools
  http-gateway:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: allura-http-gateway
    restart: unless-stopped
    ports:
      - "5888:3201"
    env_file:
      - .env
      - .env.local
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER}
      - RUVECTOR_HOST=postgres
      - RUVECTOR_PORT=5432
      - RUVECTOR_USER=${POSTGRES_USER}
      - RUVECTOR_DB=${POSTGRES_DB}
      - ALLURA_MCP_HTTP_PORT=3201
      - ALLURA_MCP_HTTP_ENABLED=true
      - GRAPH_BACKEND=${GRAPH_BACKEND:-neo4j}
      - DEFAULT_GROUP_ID=${DEFAULT_GROUP_ID:-allura-roninmemory}
      - RUVIX_KERNEL_SECRET=${RUVIX_KERNEL_SECRET}
    networks:
      - knowledge-network
    command: ["bun", "run", "src/mcp/canonical-http-gateway.ts"]
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3201/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Notion: remote MCP only (mcp__claude_ai_Notion__*). No local service needed.

# =============================================================================
# Volume Definitions
# =============================================================================
# All volumes are now explicitly declared with external: true since they are
# pre-existing (created by docker-compose v1.x or manual docker volume create).
#
# Pre-existing volumes:
#   - memory_postgres_data    (name: postgres_data)
#   - neo4j_data              (name: neo4j_data)
#   - neo4j_logs              (name: neo4j_logs)
# =============================================================================
volumes:
  # PostgreSQL data volume - pinned to existing database
  postgres_data:
    external: true
    name: memory_postgres_data

  # Neo4j data volume - pre-existing (created separately)
  neo4j_data:
    external: true
    name: neo4j_data

  # Neo4j logs volume - pre-existing (created separately)
  neo4j_logs:
    external: true
    name: neo4j_logs

# =============================================================================
# Network Configuration
# =============================================================================
networks:
  knowledge-network:
    driver: bridge
    name: knowledge-network
