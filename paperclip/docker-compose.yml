version: '3.8'

services:
  paperclip:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paperclip-dashboard
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - OPENCLAW_URL=http://host.docker.internal:3200
      - POSTGRES_HOST=knowledge-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=memory
      - POSTGRES_USER=ronin4life
      - POSTGRES_PASSWORD=test1234
      - NEO4J_URI=bolt://knowledge-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=test1234
    networks:
      - allura-network
    restart: unless-stopped
    labels:
      - "com.docker.compose.project=allura-memory"
      - "com.docker.compose.service=paperclip"

networks:
  allura-network:
    external: true
    name: allura-memory_allura-network
