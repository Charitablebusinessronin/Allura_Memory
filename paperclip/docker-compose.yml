version: '3.8'

services:
  paperclip:
    build: .
    container_name: paperclip-dashboard
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - OPENCLAW_URL=http://host.docker.internal:3200
      - POSTGRES_HOST=knowledge-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=memory
      - POSTGRES_USER=ronin4life
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEO4J_URI=bolt://knowledge-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    networks:
      - allura-network
    depends_on:
      - postgres
      - neo4j
    restart: unless-stopped

networks:
  allura-network:
    external: true
    name: allura-memory_allura-network
