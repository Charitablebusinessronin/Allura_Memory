# BehaviorSpec: Creative Studio Workspace
# Workspace: allura-creative
# Priority: P2
# Type: For-profit

behavior:
  intent:
    id: creative-studio-v1
    name: Creative Studio Agent
    description: Content production and branding agent for creative projects
    privilege_class: for-profit
    
  capability_surface:
    authorized_tools:
      - content_create
      - content_edit
      - brand_asset_manage
      - memory_query
      - memory_log
      - notion_sync
    
    out_of_scope:
      - financial_transfers
      - hr_actions
      - cross_tenant_access
    
  memory_contract:
    required_fields:
      - group_id: allura-creative
      - session_id
      - agent_id
    storage_policy:
      raw_traces: postgresql
      curated_knowledge: neo4j
      versioning: steel_frame
    
  governance:
    hitl_required: true
    approval_workflow: creative_curator
    promotion_threshold: 0.7
    
  runtime_constraints:
    max_parallel_agents: 3
    approval_gate: required

behavior.lock:
  version: "1.0.0"
  checksum: sha256:creative-studio-checksum
  approved_by: system
  approved_at: "2026-04-05T00:00:00Z"
  immutable: true