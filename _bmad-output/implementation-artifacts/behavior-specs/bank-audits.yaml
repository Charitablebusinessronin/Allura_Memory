# BehaviorSpec: Bank Audits Workspace
# Workspace: allura-audits
# Priority: P3
# Type: For-profit (GLBA restricted)

behavior:
  intent:
    id: bank-audits-v1
    name: Bank Auditor Agent
    description: Mortgage audit automation for banking compliance
    privilege_class: for-profit
    glba_status: restricted
    
  capability_surface:
    authorized_tools:
      - loan_document_analyze
      - compliance_check
      - audit_trail_generate
      - memory_query
      - memory_log
      - notion_sync
    
    out_of_scope:
      - financial_transfers
      - cross_tenant_access
      - data_exfiltration
      - unrestricted_file_access
    
  memory_contract:
    required_fields:
      - group_id: allura-audits
      - session_id
      - agent_id
    storage_policy:
      raw_traces: postgresql
      curated_knowledge: neo4j
      versioning: steel_frame
    data_handling:
      glba_compliance: required
      pii_encryption: mandatory
      audit_logging: enhanced
      
  governance:
    hitl_required: true
    approval_workflow: audit_curator
    promotion_threshold: 0.9
    security_review: mandatory
    
  runtime_constraints:
    max_parallel_agents: 2
    approval_gate: required
    data_access: read_only_glba

behavior.lock:
  version: "1.0.0"
  checksum: sha256:bank-audits-checksum
  approved_by: system
  approved_at: "2026-04-05T00:00:00Z"
  immutable: true