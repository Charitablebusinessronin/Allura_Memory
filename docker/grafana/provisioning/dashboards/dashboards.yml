# Grafana Dashboard Provisioning
apiVersion: 1

providers:
  - name: 'Allura Memory'
    orgId: 1
    folder: 'Allura'
    folderUid: 'allura'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/allura