services:
  postgres:
    image: postgres:16
    container_name: knowledge-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - alluramemory_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26-community
    container_name: knowledge-neo4j
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASSWORD}
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INITIAL}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - alluramemory_neo4j_data:/data
      - alluramemory_neo4j_logs:/logs
      - ./neo4j-import:/import
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 20

  dozzle:
    image: amir20/dozzle:latest
    container_name: knowledge-dozzle
    restart: unless-stopped
    ports:
      - "8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  mcp:
    build:
      context: ..
      dockerfile: Dockerfile.mcp
    container_name: allura-memory-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_CLOUD_URL: ${OLLAMA_CLOUD_URL:-https://ollama.com}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:8b}
      RUVECTOR_EMBEDDING_MODEL: ${RUVECTOR_EMBEDDING_MODEL:-qwen3-embedding:8b}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "legacy"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

volumes:
  alluramemory_postgres_data:
  alluramemory_neo4j_data:
  alluramemory_neo4j_logs:
  alluramemory_postgres_backup:
    name: alluramemory_neo4j_data
  neo4j_logs:
    external: true
    name: alluramemory_neo4j_logs
  ruvector_data:
    external: true
    name: alluramemory_ruvector_data

networks:
  knowledge-network:
    driver: bridge
