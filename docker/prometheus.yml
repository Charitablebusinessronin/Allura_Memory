# Prometheus Configuration
# Scrapes from OpenTelemetry Collector and application endpoints

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'allura-memory'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # OpenTelemetry Collector metrics
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Allura Memory application
  - job_name: 'allura-memory'
    static_configs:
      - targets: ['app:3100']
    metrics_path: '/api/metrics'

  # PostgreSQL exporter (if enabled)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  # Neo4j metrics
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']

  # Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']