[task]
name = "group-id-isolation"
description = "Verify tenant isolation: agent writes with correct group_id, cannot read across tenant boundaries, and schema rejects missing group_id"
version = "1.0.0"
domain = "memory-system"
timeout_sec = 30
max_turns = 10

[scoring]
method = "deterministic"
pass_threshold = 0.75

[environment]
requires_postgres = true
group_id = "allura-test"

[metadata]
tags = ["postgres", "tenant-isolation", "group_id", "security"]
invariants = ["group_id on every row", "no cross-tenant reads", "schema rejects null group_id"]
